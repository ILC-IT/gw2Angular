<h2>Homestead</h2>

<mat-tab-group mat-stretch-tabs [(selectedIndex)]="selectedTabIndex" (selectedTabChange)="onTabChange($event)" class="example-stretched-tabs mat-elevation-z4" backgroundColor="primary" color="primary">

    <mat-tab label="Precios Huerto">

        <table mat-table id="tablaMaterialesHuerto" #sort1="matSort" [dataSource]="dataSourceMaterialesHuerto" matSort matSortActive="precioOrdenableTpVenta" matSortDirection="desc" class="mat-elevation-z8"> 
              
            <!-- icon Column -->
            <ng-container matColumnDef="icon">
                <th mat-header-cell *matHeaderCellDef> Icono </th>
                <td mat-cell *matCellDef="let element"> <img src="{{element.icon}}" /> </td>
            </ng-container>

            <!-- tengo Column -->
            <ng-container matColumnDef="tengo">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Tengo </th>
                <td mat-cell *matCellDef="let element" [ngClass]="{'redBackGround': element.tengo === 0}"> {{element.tengo}} </td>
            </ng-container>

            <!-- nombre Column -->
            <ng-container matColumnDef="nombre">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre </th>
                <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
            </ng-container>

            <!-- precioTpCompraS Column -->
            <ng-container matColumnDef="precioTpCompraS">
                <th mat-header-cell *matHeaderCellDef mat-sort-header="precioOrdenableTpCompra"> Precio TP Compra </th>
                <td mat-cell *matCellDef="let element"> {{element.precioTpCompraS}} </td>
            </ng-container>

            <!-- precioTpVentaS Column -->
            <ng-container matColumnDef="precioTpVentaS">
                <th mat-header-cell *matHeaderCellDef mat-sort-header="precioOrdenableTpVenta"> Precio TP Venta </th>
                <td mat-cell *matCellDef="let element"> {{element.precioTpVentaS}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumnsMaterialesHuerto; sticky: true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumnsMaterialesHuerto;"></tr>
        </table>

    </mat-tab>

    <mat-tab label="Glifos">

        <table mat-table id="tablaGlifos" [dataSource]="dataSourceGlyphs" class="mat-elevation-z8">
      
            <!-- Category Column -->
            <ng-container matColumnDef="category">
              <th mat-header-cell *matHeaderCellDef> Category </th>
              <td mat-cell *matCellDef="let element"> {{element.category}} </td>
            </ng-container>

            <!-- Name Column -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef> Name </th>
              <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumnsGlyphs"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumnsGlyphs;"></tr>
            
        </table>

    </mat-tab>

</mat-tab-group>
